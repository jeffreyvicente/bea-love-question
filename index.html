<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bea Love Question 💖</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #d6f0ff, #e6d6ff);
  }

  /* 🟣 BIGGER CENTERED BOX */
  .container {
    text-align: center;
    background: rgba(255,255,255,0.75);
    padding: 60px 40px;
    border-radius: 25px;
    width: min(92vw, 650px);
    min-height: 420px;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    backdrop-filter: blur(12px);
    box-shadow: 0 12px 35px rgba(0,0,0,0.12);
  }

  h1 {
    color: #5a4fcf;
    margin-bottom: 30px;
    font-size: clamp(26px, 4vw, 40px);
  }

  .buttons {
    position: relative;
    width: 100%;
    height: 180px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  button {
    padding: 14px 26px;
    font-size: 18px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
  }

  #yesBtn {
    background: #a0e7e5;
    z-index: 2;
    position: relative;
  }

  #noBtn {
    background: #ffaecc;
    position: absolute;
  }

  #message {
    margin-top: 25px;
    font-size: 22px;
    display: none;
    color: #444;
  }

  /* 🎉 Confetti */
  .confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: fall 3s linear forwards;
    z-index: 999;
  }

  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(720deg);
      opacity: 0;
    }
  }
</style>
</head>

<body>

<div class="container">
  <h1>Do you love me? 💕</h1>

  <div class="buttons" id="playArea">
    <button id="yesBtn">Yes 😍</button>
    <button id="noBtn">No 😢</button>
  </div>

  <div id="message">I knew it, Bea! 💖🥰</div>
</div>

<script>
  const noBtn = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");
  const message = document.getElementById("message");
  const playArea = document.getElementById("playArea");

  let yesRect;

  function updateYesRect() {
    yesRect = yesBtn.getBoundingClientRect();
  }

  function moveNoButton() {
    updateYesRect();

    const area = playArea.getBoundingClientRect();

    let x, y, safe = false;

    while (!safe) {
      x = Math.random() * (area.width - noBtn.offsetWidth);
      y = Math.random() * (area.height - noBtn.offsetHeight);

      const noLeft = area.left + x;
      const noTop = area.top + y;

      const overlap =
        noLeft < yesRect.right &&
        noLeft + noBtn.offsetWidth > yesRect.left &&
        noTop < yesRect.bottom &&
        noTop + noBtn.offsetHeight > yesRect.top;

      if (!overlap) safe = true;
    }

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  }

  window.onload = moveNoButton;

  noBtn.addEventListener("mouseover", moveNoButton);

  playArea.addEventListener("touchmove", (e) => {
    const touch = e.touches[0];
    const rect = noBtn.getBoundingClientRect();

    const distance = Math.hypot(
      touch.clientX - (rect.left + rect.width / 2),
      touch.clientY - (rect.top + rect.height / 2)
    );

    if (distance < 90) moveNoButton();
  });

  function launchConfetti() {
    for (let i = 0; i < 70; i++) {
      const c = document.createElement("div");
      c.classList.add("confetti");

      c.style.left = Math.random() * window.innerWidth + "px";
      c.style.background = `hsl(${Math.random() * 360}, 80%, 60%)`;
      c.style.animationDuration = (2 + Math.random() * 2) + "s";

      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }
  }

  yesBtn.addEventListener("click", () => {
    message.style.display = "block";
    noBtn.style.display = "none";
    launchConfetti();
  });
</script>

</body>
</html>
