<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Bea 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #d6f0ff, #e6d6ff);
  overflow: hidden;
}

.container {
  width: min(92vw, 650px);
  min-height: 460px;
  background: rgba(255,255,255,0.8);
  border-radius: 25px;
  padding: 40px;
  text-align: center;
  backdrop-filter: blur(12px);
  box-shadow: 0 12px 35px rgba(0,0,0,0.12);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.step {
  display: none;
  animation: fade 0.6s ease;
}

.step.active {
  display: block;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

button {
  padding: 14px 24px;
  margin-top: 20px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

.nextBtn {
  background: #a0e7e5;
}

.buttons {
  position: relative;
  height: 200px;
}

#yesBtn {
  background: #a0e7e5;
  position: absolute;
}

#noBtn {
  background: #ffaecc;
  position: absolute;
  transition: left 0.2s ease, top 0.2s ease;
}

.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: -10px;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(720deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- STEP 1 -->
  <div class="step active" id="step1">
    <h1>Hi Bea 💕</h1>
    <p>I made something for you…</p>
    <button class="nextBtn" onclick="nextStep()">Continue</button>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">
    <h1>Be honest… 👀</h1>
    <p>Do you smile when you see me? 😏</p>
    <button class="nextBtn" onclick="nextStep()">Maybe...</button>
  </div>

  <!-- STEP 3 (Your game) -->
  <div class="step" id="step3">
    <h1>Okay final question… 💖</h1>
    <p>Bea… do you love me?</p>

    <div class="buttons" id="playArea">
      <button id="yesBtn">Yes 😍</button>
      <button id="noBtn">No 😢</button>
    </div>
  </div>

  <!-- STEP 4 -->
  <div class="step" id="step4">
    <h1>I knew it 😭💖</h1>
    <p>You just made my whole day.</p>
    <p>You're stuck with me now 😏</p>
  </div>

</div>

<script>
let currentStep = 1;

function nextStep() {
  document.getElementById(`step${currentStep}`).classList.remove("active");
  currentStep++;
  document.getElementById(`step${currentStep}`).classList.add("active");

  if (currentStep === 3) {
    setTimeout(centerButtons, 200);
  }
}

/* --- BUTTON LOGIC --- */
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const playArea = document.getElementById("playArea");

function centerButtons() {
  const rect = playArea.getBoundingClientRect();
  const centerX = rect.width / 2;
  const centerY = rect.height / 2;

  yesBtn.style.left = (centerX - 100) + "px";
  yesBtn.style.top = centerY + "px";

  noBtn.style.left = (centerX + 40) + "px";
  noBtn.style.top = centerY + "px";
}

function moveNoButton() {
  const rect = playArea.getBoundingClientRect();
  const padding = 10;

  const maxX = rect.width - noBtn.offsetWidth - padding;
  const maxY = rect.height - noBtn.offsetHeight - padding;

  const x = Math.max(padding, Math.random() * maxX);
  const y = Math.max(padding, Math.random() * maxY);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseenter", moveNoButton);
noBtn.addEventListener("touchstart", (e) => {
  e.preventDefault();
  moveNoButton();
});

yesBtn.addEventListener("click", () => {
  launchConfetti();
  nextStep();
});

/* --- CONFETTI --- */
function launchConfetti() {
  for (let i = 0; i < 80; i++) {
    const c = document.createElement("div");
    c.classList.add("confetti");

    c.style.left = Math.random() * window.innerWidth + "px";
    c.style.background = `hsl(${Math.random()*360}, 80%, 60%)`;
    c.style.animationDuration = (2 + Math.random()*2) + "s";

    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}
</script>

</body>
</html>
