<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bea Love Question 💖</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #d6f0ff, #e6d6ff);
    overflow: hidden;
  }

  .container {
    text-align: center;
    background: rgba(255,255,255,0.75);
    padding: 60px 40px;
    border-radius: 25px;
    width: min(92vw, 650px);
    min-height: 450px;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    backdrop-filter: blur(12px);
    box-shadow: 0 12px 35px rgba(0,0,0,0.12);
  }

  h1 {
    color: #5a4fcf;
    margin-bottom: 20px;
    font-size: clamp(26px, 4vw, 40px);
  }

  .buttons {
    position: relative;
    width: 100%;
    height: 180px;

    display: flex;
    justify-content: center;
    align-items: center;
  }

  button {
    padding: 14px 26px;
    font-size: 18px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
  }

  #yesBtn {
    background: #a0e7e5;
    margin-right: 20px;
    z-index: 2;
  }

  #noBtn {
    background: #ffaecc;
    position: relative;
  }

  #message {
    margin-top: 20px;
    font-size: 22px;
    display: none;
    color: #444;
  }

  /* 💬 Hover warning */
  #hoverMsg {
    margin-top: 10px;
    font-size: 18px;
    color: #5a4fcf;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  #hoverMsg.show {
    opacity: 1;
  }

  /* 🎉 Confetti */
  .confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    top: -10px;
    animation: fall 3s linear forwards;
    z-index: 999;
  }

  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(720deg);
      opacity: 0;
    }
  }
</style>
</head>

<body>

<div class="container">
  <h1>Do you love me? 💕</h1>

  <div class="buttons" id="playArea">
    <button id="yesBtn">Yes 😍</button>
    <button id="noBtn">No 😢</button>
  </div>

  <div id="hoverMsg">Are you sure? 👀💖</div>
  <div id="message">I knew it, Bea! 💖🥰</div>
</div>

<script>
  const noBtn = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");
  const message = document.getElementById("message");
  const hoverMsg = document.getElementById("hoverMsg");
  const playArea = document.getElementById("playArea");

  let activated = false;

  function moveNoButton() {
    const rect = playArea.getBoundingClientRect();

    const maxX = rect.width - noBtn.offsetWidth;
    const maxY = rect.height - noBtn.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  }

  function activateEscape() {
    activated = true;
    moveNoButton();
  }

  // 🖱 No button behavior
  noBtn.addEventListener("mouseenter", () => {
    if (activated) moveNoButton();
  });

  noBtn.addEventListener("mousedown", activateEscape);
  noBtn.addEventListener("touchstart", activateEscape);

  // ❤️ Yes hover warning
  yesBtn.addEventListener("mouseenter", () => {
    hoverMsg.classList.add("show");
  });

  yesBtn.addEventListener("mouseleave", () => {
    hoverMsg.classList.remove("show");
  });

  // 🎉 Yes click
  yesBtn.addEventListener("click", () => {
    message.style.display = "block";
    noBtn.style.display = "none";
    hoverMsg.style.display = "none";
    launchConfetti();
  });

  // 💥 Confetti
  function launchConfetti() {
    for (let i = 0; i < 70; i++) {
      const c = document.createElement("div");
      c.classList.add("confetti");

      c.style.left = Math.random() * window.innerWidth + "px";
      c.style.background = `hsl(${Math.random() * 360}, 80%, 60%)`;
      c.style.animationDuration = (2 + Math.random() * 2) + "s";

      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }
  }
</script>

</body>
</html>
